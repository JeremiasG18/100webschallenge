<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo XVI | Welcome</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="head">
        <section class="head__info">
            <div>
                <h1>The largest community of photo enthusiasts</h1>
                <a href="#" class="bottom">Join Today</a>
            </div>
        </section>
        <img src="img/showcase.jpg" alt="Hermoso paisaje">
    </header>
    <main class="main">
        <div class="main__content">
            <h2>Ready to join?</h2>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore</p>
            <form action="#">
                <h3>Sign up today</h3>
                <div>
                    <label for="name">First Name</label>
                    <input type="text" name="name" id="name">

                </div>
                <div>
                    <label for="lastname">Last Name</label>
                    <input type="text" name="lastname" id="lastname">
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password">
                </div>
                <input type="submit" value="Sign Up" class="bottom">
            </form>
        </div>
    </main>
</body>
</html>
